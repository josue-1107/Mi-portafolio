<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Josue</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./Style.css">
</head>
<body>

<div class="glitch-bar"></div>
<div class="cursor" id="cursor"></div>
<div class="cursor-trail" id="cursorTrail"></div>

<div class="container">

  <!-- HERO -->
  <section class="hero">
    <div class="hero-bg-circle"></div>
    <div class="tag">// Portafolio</div>
    <h1 class="hero-name"><span>J</span>OSUE</h1>
    <p class="hero-sub">Motos · Fútbol · Velocidad · Estilo</p>
    <div class="scroll-hint">Scroll</div>
  </section>

  <!-- HOBBIES -->
  <section class="section">
    <div class="section-label">
      <span class="section-num">01</span>
      <h2 class="section-title">Mis Hobbies</h2>
    </div>
    <div class="hobbies-grid">
      <div class="hobby-card">
        <span class="hobby-icon">🏍️</span>
        <div class="hobby-title">Andar en Moto</div>
      </div>
      <div class="hobby-card">
        <span class="hobby-icon">👁️</span>
        <div class="hobby-title">Ver Motos</div>
      </div>
      <div class="hobby-card">
        <span class="hobby-icon">⚽</span>
        <div class="hobby-title">Jugar Fútbol</div>
      </div>
    </div>
  </section>

  <div class="divider"></div>

  <!-- LIKES -->
  <section class="section likes-section">
    <div class="section-label">
      <span class="section-num">02</span>
      <h2 class="section-title">Lo que me gusta</h2>
    </div>
    <div class="likes-wrap">
      <div class="like-pill"><span class="emoji">🏍️</span><span>MOTOS</span></div>
      <div class="like-pill"><span class="emoji">🚗</span><span>CARROS</span></div>
      <div class="like-pill"><span class="emoji">⚽</span><span>FÚTBOL</span></div>
      <div class="like-pill"><span class="emoji">💸</span><span>DINERO</span></div>
      <div class="like-pill"><span class="emoji">🔥</span><span>VELOCIDAD</span></div>
      <div class="like-pill"><span class="emoji">🌙</span><span>ESTILO PROPIO</span></div>
    </div>
  </section>

  <div class="divider"></div>

  <!-- QUOTE -->
  <section class="quote-section">
    <p class="big-quote">
      La vida es corta —<br>
      <em>vívela a máxima velocidad.</em>
    </p>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-name">JOSUE</div>
    <div class="footer-copy">© 2026 — Todos los derechos reservados</div>
  </footer>

</div>

<script src="./Script.js"></script>
</body>
</html>
